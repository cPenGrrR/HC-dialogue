<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PyPersona - WebRTC AV Player & Model Manager</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 1rem; max-width: 1200px; margin: 0 auto; }
    .container { display: flex; gap: 2rem; }
    .player-section, .upload-section { flex: 1; background: #f5f5f5; padding: 1.5rem; border-radius: 8px; }
    video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; }
    button { padding: 0.5rem 1rem; margin-top: 1rem; font-size: 1rem; margin-right: .5rem; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.6; }
    input[type="text"], input[type="file"] { width: 100%; padding: 0.5rem; margin-bottom: 1rem; margin-top: 0.5rem; box-sizing: border-box; }
    .log-box { margin-top: 1rem; color: #333; font-size: 0.9rem; background: #fff; padding: 1rem; border-radius: 4px; height: 150px; overflow-y: auto; border: 1px solid #ddd; }
    h2 { margin-top: 0; }
    .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 4px; margin-top: 0.5rem; overflow: hidden; display: none; }
    .progress-bar-fill { height: 10px; background-color: #4CAF50; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>PyPersona Control Panel</h1>
  <div class="container">
    <div class="player-section">
      <h2>Live Conversation</h2>
      <video id="video" playsinline autoplay controls></video>
      <br/>
      <button id="start">开始通话</button>
      <button id="stop" disabled>结束通话</button>
      <button id="mute" disabled>静音本地麦克风</button>
      <div class="log-box" id="webrtc-log"></div>
    </div>
    
    <div class="upload-section">
      <h2>Train New Avatar</h2>
      <label for="modelName">Avatar Name:</label>
      <input type="text" id="modelName" placeholder="e.g., my_new_avatar" />
      
      <label for="videoFile">Training Video (512x512, 25fps recommended):</label>
      <input type="file" id="videoFile" accept="video/mp4,video/quicktime,video/x-msvideo,video/x-matroska" />
      
      <button id="uploadBtn">Upload & Train</button>
      
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      
      <div class="log-box" id="upload-log"></div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const log = (...args) => { 
    const logBox = $('webrtc-log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
    logBox.appendChild(p);
    logBox.scrollTop = logBox.scrollHeight;
  };
  const uploadLog = (...args) => {
    const logBox = $('upload-log');
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${args.join(' ')}`;
    logBox.appendChild(p);
    logBox.scrollTop = logBox.scrollHeight;
  };

  let pc = null;
  let audioTransceiver = null;
  let localMicTrack = null;
  let remoteStream = null;

  const videoElem = $('video');

  function setUIState(running) {
    $('start').disabled = running;
    $('stop').disabled = !running;
    $('mute').disabled = !running || !localMicTrack;
    $('mute').textContent = (localMicTrack && localMicTrack.enabled) ? '静音本地麦克风' : '取消静音';
  }

  function attachRemoteTrackEvents() {
    remoteStream = new MediaStream();
    pc.addEventListener("track", (event) => {
      remoteStream.addTrack(event.track);
      if (videoElem.srcObject !== remoteStream) {
        videoElem.srcObject = remoteStream;
      }
    });
  }

  function addTransceivers() {
    // 下行：只接收视频
    pc.addTransceiver('video', { direction: 'recvonly' });
    // 音频：默认双向（既接收后端音频，又发送本地麦克风）
    audioTransceiver = pc.addTransceiver('audio', { direction: 'sendrecv' });
  }

  async function waitForIceGathering() {
    if (pc.iceGatheringState === "complete") return;
    const p1 = new Promise(resolve => {
      const check = () => {
        if (pc.iceGatheringState === "complete") {
          pc.removeEventListener("icegatheringstatechange", check);
          resolve();
        }
      };
      pc.addEventListener("icegatheringstatechange", check);
    });
    // 最多等待 800ms，通常足够收集到 Host Candidate
    const p2 = new Promise(resolve => setTimeout(resolve, 800));
    await Promise.race([p1, p2]);
  }

  async function startSession() {
    if (pc) return; // 已在运行
    log('初始化会话…');

    pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    // 结束/失败时的清理
    pc.addEventListener('connectionstatechange', () => {
      if (['failed','closed','disconnected'].includes(pc.connectionState)) {
        stopSession(/*fromStateChange*/true);
      }
    });

    attachRemoteTrackEvents();
    addTransceivers();

    // 申请本地麦克风并绑定到发送端；用户拒绝时降级为仅接收
    localMicTrack = null;
    try {
      log('请求麦克风权限…');
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      localMicTrack = micStream.getAudioTracks()[0];
      await audioTransceiver.sender.replaceTrack(localMicTrack);
      log('已获取麦克风，建立连接…');
    } catch (err) {
      console.warn('getUserMedia 失败：', err);
      log('麦克风不可用：仅播放远端音视频。');
      try {
        await audioTransceiver.sender.replaceTrack(null);
        audioTransceiver.direction = 'recvonly';
      } catch (_) {}
    }

    // SDP 交换
    await pc.setLocalDescription(await pc.createOffer());
    // 优化：不再死等 ICE Complete，而是设定超时，避免几十秒等待
    await waitForIceGathering();

    const resp = await fetch("/offer", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(pc.localDescription)
    });

    if (!resp.ok) {
      log('信令失败：', resp.status, await resp.text());
      // 出错立即收尾
      await stopSession();
      return;
    }

    const answer = await resp.json();
    await pc.setRemoteDescription(answer);

    setUIState(true);
    log('连接已建立 ✅ 正在收/发音视频…');
  }

  async function stopSession(fromStateChange = false) {
    // 停止本地麦克风
    try { localMicTrack && localMicTrack.stop(); } catch(_) {}

    // 停止发送端轨道
    if (pc) {
      pc.getSenders().forEach(s => {
        try { s.track && s.track.stop(); } catch(_) {}
        try { s.replaceTrack(null); } catch(_) {}
      });
      // 停止接收端轨道
      pc.getReceivers().forEach(r => { try { r.track && r.track.stop(); } catch(_) {} });
      try { pc.close(); } catch(_) {}
    }

    // 解除远端播放
    if (remoteStream) {
      remoteStream.getTracks().forEach(t => { try { t.stop(); } catch(_) {} });
    }
    videoElem.srcObject = null;

    // 清空引用，便于下次“开始”重新创建
    pc = null;
    audioTransceiver = null;
    localMicTrack = null;
    remoteStream = null;

    setUIState(false);
    if (!fromStateChange) log('会话已结束 ⏹️');
  }

  // 本地静音/恢复（不重建会话）
  $('mute').addEventListener('click', () => {
    if (!localMicTrack) return;
    localMicTrack.enabled = !localMicTrack.enabled;
    $('mute').textContent = localMicTrack.enabled ? '静音本地麦克风' : '取消静音';
  });

  $('start').addEventListener('click', startSession);
  $('stop').addEventListener('click', () => stopSession());

  // 页面关闭前的兜底清理
  window.addEventListener('beforeunload', () => stopSession());

  // === 视频上传与模型训练逻辑 ===
  const UPLOAD_API_URL = ''; // Now served on the same origin/port as the WebRTC page

  $('uploadBtn').addEventListener('click', async () => {
    const fileInput = $('videoFile');
    const modelNameInput = $('modelName');
    
    if (!fileInput.files.length) {
      alert("请选择要上传的视频文件");
      return;
    }
    if (!modelNameInput.value.trim()) {
      alert("请输入要训练的 Avatar 名称");
      return;
    }

    const file = fileInput.files[0];
    const modelName = modelNameInput.value.trim();
    const uploadId = 'upload_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    // Chunking setup
    const chunkSize = 5 * 1024 * 1024; // 5MB
    const totalChunks = Math.ceil(file.size / chunkSize);
    
    $('progressBar').style.display = 'block';
    $('uploadBtn').disabled = true;
    
    uploadLog(`开始上传: ${file.name} (大小: ${(file.size / 1024 / 1024).toFixed(2)} MB, 分片: ${totalChunks})`);

    try {
      // 1. Upload chunks
      for (let i = 0; i < totalChunks; i++) {
        const start = i * chunkSize;
        const end = Math.min(start + chunkSize, file.size);
        const chunk = file.slice(start, end);
        
        const formData = new FormData();
        formData.append("file", chunk, file.name);
        formData.append("chunk_index", i);
        formData.append("total_chunks", totalChunks);
        formData.append("upload_id", uploadId);
        
        await fetch(`${UPLOAD_API_URL}/upload/chunk`, {
          method: 'POST',
          body: formData
        });
        
        const progress = ((i + 1) / totalChunks) * 100;
        $('progressFill').style.width = `${progress}%`;
        uploadLog(`分片 ${i + 1}/${totalChunks} 上传成功...`);
      }
      
      // 2. Complete upload
      uploadLog(`所有分片上传完毕，通知服务器合并...`);
      const completeData = new FormData();
      completeData.append("upload_id", uploadId);
      completeData.append("filename", file.name);
      
      const completeResp = await fetch(`${UPLOAD_API_URL}/upload/complete`, {
        method: 'POST',
        body: completeData
      });
      
      if (!completeResp.ok) throw new Error("服务器合并失败");
      uploadLog(`服务器合并成功，已启动后台预处理和模型训练管道！`);
      
      // 3. Create model record
      const modelResp = await fetch(`${UPLOAD_API_URL}/models/?name=${encodeURIComponent(modelName)}&video_upload_id=${encodeURIComponent(uploadId)}`, {
        method: 'POST'
      });
      if (!modelResp.ok) throw new Error("创建模型记录失败");
      
      const modelData = await modelResp.json();
      uploadLog(`模型创建成功，名称: ${modelData.name}, 版本: ${modelData.version}`);
      uploadLog(`请在后台查看训练进度 (TalkingGaussian)`);
      
    } catch (err) {
      uploadLog(`[错误] ${err.message}`);
    } finally {
      $('uploadBtn').disabled = false;
    }
  });

})();
</script>
</body>
</html>
